<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Merchandise | Luxury Store</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:#0c0c0c;
color:#fff;
}

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 30px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

nav b{font-family:'Playfair Display'}

.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1548036328-c9fa89d128fa?auto=format&fit=crop&w=1600&q=80') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.hero div{
position:relative;
z-index:2;
}

h1{
font-family:'Playfair Display';
font-size:52px;
}

.btn{
padding:12px 20px;
border:1px solid white;
cursor:pointer;
display:inline-block;
margin-top:15px;
}

.btn:hover{
background:white;
color:black;
}

section{
padding:80px 30px;
max-width:1200px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
}

.card{
background:#151515;
border-radius:12px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:#d4af37;
margin-top:8px;
}

button{
margin-top:10px;
padding:8px 12px;
border:none;
cursor:pointer;
background:#fff;
color:#000;
}

button:hover{
background:#d4af37;
}

.cart{
position:fixed;
right:20px;
bottom:20px;
background:#000;
border:1px solid #444;
padding:15px;
width:260px;
}

.cart h3{
margin:0 0 10px 0;
}

.small{
font-size:12px;
opacity:.7;
}

.checkout{
margin-top:10px;
width:100%;
}
</style>
</head>

<body>

<nav>
<b>Creative Merchandise</b>
<div>Luxury Collection</div>
</nav>

<div class="hero">
<div>
<h1>Luxury Leather Goods</h1>
<p>Modern handcrafted elegance</p>
<a class="btn" href="#shop">Shop Now</a>
</div>
</div>

<section id="shop">
<h2 style="text-align:center;font-family:'Playfair Display'">Signature Collection</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?auto=format&fit=crop&w=900&q=80">
<div class="card-content">
<h3>Aurora Top Handle</h3>
<div class="price">£2,525</div>
<button onclick="add('Aurora Top Handle',2525)">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1594223274512-ad4803739b7c">
<div class="card-content">
<h3>Kensington Tote</h3>
<div class="price">£2,990</div>
<button onclick="add('Kensington Tote',2990)">Add to Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1548036328-c9fa89d128fa">
<div class="card-content">
<h3>Milano Signature</h3>
<div class="price">£3,900</div>
<button onclick="add('Milano Signature',3900)">Add to Cart</button>
</div>
</div>

</div>
</section>

<div class="cart">
<h3>🛒 Cart</h3>
<div id="items" class="small">Empty</div>
<p>Total: £<span id="total">0</span></p>
<button class="checkout" onclick="checkout()">Checkout</button>
</div>

<script>

let cart = [];
let total = 0;

function add(name,price){
cart.push({name,price});
total += price;
render();
}

function render(){
let items = document.getElementById("items");
items.innerHTML = cart.map(i=>i.name+" - £"+i.price).join("<br>");
document.getElementById("total").innerText = total;
}

function checkout(){
alert("Order sent to Creative Merchandise Limited\nTotal: £"+total);
cart=[];
total=0;
render();
}

</script>

</body>
</html>
